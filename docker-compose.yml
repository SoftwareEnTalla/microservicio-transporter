services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    networks:
      entalla-net: {}
      shared-net:
        aliases:
          - transporter-fleet-unit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  entalla-net:
    driver: bridge
  shared-net:
    external: true
